<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View PDF</title>
    <!-- Include PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        #pdfContainer {
            width: 100%;
            height: 800px;
            border: 1px solid #ccc;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>Processed PDF</h1>
    
    {% if pdf_url %}
        <!-- Using Mozilla's PDF.js viewer -->
        <iframe
            id="pdfContainer"
            src="https://mozilla.github.io/pdf.js/web/viewer.html?file={{ request.scheme }}://{{ request.get_host }}{{ pdf_url }}"
            width="100%"
            height="800px"
            frameborder="0">
        </iframe>

        
        <!-- Debug info -->
        <div style="margin-top: 20px; padding: 10px; background: #f5f5f5;">
            {% comment %} <p>PDF URL: {{ pdf_url }}</p> {% endcomment %}
            {% comment %} <p>Full URL: {{ request.scheme }}://{{ request.get_host }}{{ pdf_url }}</p> {% endcomment %}
        </div>
    {% else %}
        <p>No PDF available to display.</p>
    {% endif %}
</body>
</html>
