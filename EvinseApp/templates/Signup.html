<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: white;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: left;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #fff;
            padding: 35px; 
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 380px;
            height: auto;
            max-height: 90vh;
            margin-left: 40px;
            transition: box-shadow 0.3s ease;
        }
        .container:hover {
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        h2 {
            font-weight: 500;
            text-align: left;
            color: #333;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: 500;
            margin-top: 5px;
            font-size: 14px;
            color: #555;
        }
        input {
            width: 100%;
            padding: 8px 10px;
            margin: 6px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 15px;
            transition: border 0.3s ease;
        }
        input:focus {
            border-color: #4CAF50;
            outline: none;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            width: auto; /* Remove full width */
            align-self: flex-start; /* Align button to the left */
            transition: background-color 0.3s ease, transform 0.2s ease;
            margin-top: 15px;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
            transform: translateY(-2px);
        }
        a {
            color: #4CAF50;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        p {
            text-align: center;
            margin-top: 15px;
            color: black;
            font-size: 14px;
        }
        ul {
            padding: 6px;
            border-radius: 10px;
            margin-top: 5px;
            color: red;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Sign Up</h2>

        <form method="POST">
            {% csrf_token %}
            <label for="cUsername"><b>Username:</b></label>
            <input type="text" name="cUsername" id="cUsername" autocomplete="off" required 
                   value="{{ form_data.cUsername|default:'' }}">
        
            <label for="cEmail"><b>Email:</b></label>
            <input type="email" name="cEmail" id="cEmail" autocomplete="off" required 
                   value="{{ form_data.cEmail|default:'' }}">
        
            <label for="nMobile"><b>Mobile Number:</b></label>
            <input type="text" name="nMobile" id="nMobile" autocomplete="off" required 
                   value="{{ form_data.nMobile|default:'' }}">
        
            <label for="cPassword"><b>Password:</b></label>
            <input type="password" name="cPassword" id="cPassword" autocomplete="off" required
                   value="{{ form_data.cPassword|default:'' }}">
        
            <label for="cConfirmPassword"><b>Confirm Password:</b></label>
            <input type="password" name="cConfirmPassword" id="cConfirmPassword" autocomplete="off" required
                   value="{{ form_data.cConfirmPassword|default:'' }}">
        
            <button type="submit">Sign Up</button>
        </form>

        {% if messages %}
            <ul>
                {% for message in messages %}
                    {{ message }}
                {% endfor %}
            </ul>
        {% endif %}
        
        <p>Already have an account? <a href="{% url 'Signin' %}">Sign In</a></p>
    </div>
</body>
</html>
