<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: flex-start; /* Align the container to the left */
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
            overflow: hidden;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 300px;
            text-align: left;
            margin-left: 40px; /* Add margin to move it away from the left edge */
        }
        h2 {
            font-weight: 500;
            margin-bottom: 20px;
        }
        form {
            margin-bottom: 20px;
        }
        label {
            font-weight: 500;
            display: block;
            margin-bottom: 5px;
            text-align: left;
        }
        input {
            width: 95%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            width: 30%;
        }
        button:hover {
            background-color: #45a049;
        }
        a button {
            background-color: #2196F3;
            width: 100%;
        }
        a button:hover {
            background-color: #0b7dda;
        }
        p {
            margin-top: 10px;
            font-size: 16px;
            display: inline-block; /* Make the text inline to align it with the button */
        }
        .signup-container {
            display: flex;
            align-items: center;
            gap: 10px; /* Add some space between the text and button */
        }
        ul {
            list-style-type: none;
            padding: 0;
            margin-bottom: 15px;
            color: red;
            font-weight: 500;
            text-align: left;
        }
        ul li {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Sign In</h2>

        <form method="POST">
            {% csrf_token %}
            <label for="cUserName">Username:</label>
            <input type="text" name="cUserName" id="cUserName" autocomplete="off" required>

            <label for="cPassword">Password:</label>
            <input type="password" name="cPassword" id="cPassword" autocomplete="off" required>

            <button type="submit">Sign In</button>
        </form>

        {% if messages %}
            <ul>
                {% for message in messages %}
                    <li>{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}

        <div class="signup-container">
            <p>Don't have an account?</p>
            <a href="{% url 'Signup' %}">
                <button type="button">Sign Up</button>
            </a>
        </div>
    </div>
</body>
</html>
